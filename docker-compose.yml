services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host
    privileged: true
    environment:
      - TZ=${HOMEASSISTANT_TZ}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./home-assistant/config:/config
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped

  raspap:
    container_name: raspap
    image: ghcr.io/raspap/raspap-docker:latest
    #build: .
    ports:
      - "8081:8081"
    privileged: true
    network_mode: host
    cgroup: host
    environment:
      - RASPAP_SSID=${RASPAP_SSID}
      - RASPAP_SSID_PASS=${RASPAP_SSID_PASS}
      - RASPAP_COUNTRY=${RASPAP_COUNTRY}
      - RASPAP_WEBGUI_USER=${RASPAP_WEBGUI_USER}
      - RASPAP_WEBGUI_PASS=${RASPAP_WEBGUI_PASS}
      - RASPAP_WEBGUI_PORT=8081
    cap_add:
      - SYS_ADMIN
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    restart: unless-stopped
